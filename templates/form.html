<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMCTech Service Request Form</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/heroicons@2.0.13/dist/heroicons.min.js"></script>
</head>
<body class="min-h-screen flex flex-col gradient-bg">
    <!-- Navbar -->
    <nav class="bg-purple-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="logo1.jpg" alt="PMC Logo" class="h-12 w-12 rounded-full border-2 border-white">
                <span class="font-bold text-2xl text-white tracking-wide">PMC Tech</span>
            </div>
            <div>
                <a href="/" class="text-white hover:text-indigo-200 font-semibold transition">Home</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center">
        <div class="w-full max-w-2xl bg-white rounded-2xl card-shadow p-10 mt-10 mb-10 border-2 border-indigo-100">
            <div class="flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-purple-800 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
                <h2 class="text-3xl font-extrabold text-purple-800 text-center tracking-wide">Service Complaint Request</h2>
            </div>
            <form id="serviceForm" method="POST" enctype="multipart/form-data" class="space-y-7">
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <span class="inline-block"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v4a1 1 0 001 1h16a1 1 0 001-1V7M3 7l9-4 9 4M4 21h16a1 1 0 001-1v-8a1 1 0 00-1-1H4a1 1 0 00-1 1v8a1 1 0 001 1z"/></svg></span>
                        <label for="institution" class="block text-lg font-semibold text-purple-800">Institution</label>
                    </div>
                    <select class="block w-full text-lg rounded-xl border border-gray-300 bg-white shadow-sm focus:ring-purple-800 focus:border-purple-800 px-4 py-3" id="institution" name="institution" required>
                        <option value="">Select Institution</option>
                        <option value="Engineering">Engineering</option>
                        <option value="ITI">ITI</option>
                        <option value="Polytechnic">Polytechnic</option>
                        <option value="School">School</option>
                    </select>
                    <div class="flex items-center gap-4 mt-6">
                        <span class="inline-block"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2a1 1 0 001 1h14a1 1 0 001-1v-2c0-2.66-5.33-4-8-4z"/></svg></span>
                        <label for="name" class="block text-lg font-semibold text-purple-800">Name</label>
                    </div>
                    <input type="text" class="block w-full text-lg rounded-xl border border-gray-300 bg-white shadow-sm focus:ring-purple-800 focus:border-purple-800 px-4 py-3" id="name" name="name" required>
                    <div class="flex items-center gap-4 mt-6">
                        <span class="inline-block"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h16v2H4zm2 6h12v10H6z"/></svg></span>
                        <label for="department" class="block text-lg font-semibold text-purple-800">Department</label>
                    </div>
                    <input type="text" class="block w-full text-lg rounded-xl border border-gray-300 bg-white shadow-sm focus:ring-purple-800 focus:border-purple-800 px-4 py-3" id="department" name="department" required>
                    <div class="flex items-center gap-4 mt-6">
                        <span class="inline-block"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 2a2 2 0 012 2v16a2 2 0 01-2 2H8a2 2 0 01-2-2V4a2 2 0 012-2h8zm-4 4a2 2 0 100 4 2 2 0 000-4z"/></svg></span>
                        <label for="email" class="block text-lg font-semibold text-purple-800">E-mail ID</label>
                    </div>
                    <input type="email" class="block w-full text-lg rounded-xl border border-gray-300 bg-white shadow-sm focus:ring-purple-800 focus:border-purple-800 px-4 py-3" id="email" name="email" required>
                    <div class="flex items-center gap-4 mt-6">
                        <span class="inline-block"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10a1 1 0 011-1h16a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V10zm0-6a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 6h12"/></svg></span>
                        <label for="mobile" class="block text-lg font-semibold text-purple-800">Mobile Number</label>
                    </div>
                    <input type="tel" class="block w-full text-lg rounded-xl border border-gray-300 bg-white shadow-sm focus:ring-purple-800 focus:border-purple-800 px-4 py-3" id="mobile" name="mobile" required pattern="[0-9]{10}">
                    <div class="flex items-center gap-4 mt-6">
                        <span class="inline-block"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg></span>
                        <label for="service_type" class="block text-lg font-semibold text-purple-800">Type of Service Request</label>
                    </div>
                    <select class="block w-full text-lg rounded-xl border border-gray-300 bg-white shadow-sm focus:ring-purple-800 focus:border-purple-800 px-4 py-3" id="service_type" name="service_type" required onchange="showServiceOptions()">
                        <option value="">Select Service</option>
                        <option value="System Services">System Services</option>
                        <option value="Printer Services">Printer Services</option>
                        <option value="Network Services">Network Services</option>
                        <option value="Projector">Projector</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <!-- Dynamic Service Options -->
                <div id="dynamicOptions"></div>
                <div class="mt-6">
                    <div class="flex items-center gap-4">
                        <span class="inline-block"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8" cy="13" r="3"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 19l-5-5a3 3 0 00-4.24 0L3 19"/></svg></span>
                        <label for="issue_image" class="block text-lg font-semibold text-purple-800">Upload Image of Issue (optional)</label>
                    </div>
                    <input type="file" class="hidden" id="issue_image" name="issue_image" accept="image/*" onchange="previewImage(event)">
                    <button type="button" onclick="document.getElementById('issue_image').click();" class="bg-purple-800 hover:bg-indigo-900 text-white font-bold py-2 px-6 rounded-xl shadow transition text-lg mt-2 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m0 0l-4-4m4 4l4-4"/></svg>
                        <span>Upload</span>
                    </button>
                    <div id="imagePreview" class="mt-4"></div>
                </div>
                <div class="flex justify-center mt-8">
                    <button type="submit" class="bg-purple-800 hover:bg-indigo-900 text-white font-bold py-3 px-12 rounded-xl shadow transition text-lg">Submit Request</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    {% include 'footer.html' %}

    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
        }
        .card-shadow {
            box-shadow: 0 8px 32px 0 rgba(60, 60, 120, 0.15);
        }
        input[type="file"].hidden {
            display: none;
        }
    </style>
    <script>
    function showServiceOptions() {
        const type = document.getElementById('service_type').value;
        const container = document.getElementById('dynamicOptions');
        let html = '';
        if (type === 'System Services') {
            html = `<div class='mt-8'><div class='flex items-center gap-4 mb-2'><span class='inline-block'><svg class='h-7 w-7 text-purple-800' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path d='M9 17v-2a4 4 0 00-4-4H5a2 2 0 00-2 2v5a2 2 0 002 2h14a2 2 0 002-2v-5a2 2 0 00-2-2h-.5a4 4 0 00-4 4v2m-6 0h6'/></svg></span><label class='block text-lg font-semibold text-purple-800'>System Service Issues</label></div><div class='space-y-3'>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='system_issues' value='Monitor Not Working'> <span class='text-lg'>Monitor Not Working</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='system_issues' value='Operating System Complaints'> <span class='text-lg'>Operating System Complaints</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='system_issues' value='Hardware Issues'> <span class='text-lg'>Hardware Issues</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='system_issues' value='Other'> <span class='text-lg'>Other</span></label>
            </div></div>`;
        } else if (type === 'Printer Services') {
            html = `<div class='mt-8'><div class='flex items-center gap-4 mb-2'><span class='inline-block'><svg class='h-7 w-7 text-purple-800' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path d='M16 7a4 4 0 01-8 0'/><path d='M12 3v4'/><path d='M12 17v4'/><path d='M3 12h4'/><path d='M17 12h4'/></svg></span><label class='block text-lg font-semibold text-purple-800'>Printer Model</label></div><div class='space-y-3'>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='printer_model' value='Canon 2900B'> <span class='text-lg'>Canon 2900B</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='printer_model' value='Hp Laserjet P 1020'> <span class='text-lg'>Hp Laserjet P 1020</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='printer_model' value='Hp Laserjet P 1007'> <span class='text-lg'>Hp Laserjet P 1007</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='printer_model' value='HP Laserjet Pro M128fn'> <span class='text-lg'>HP Laserjet Pro M128fn</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='printer_model' value='Hp 5200 Laserjet'> <span class='text-lg'>Hp 5200 Laserjet</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='printer_model' value='Other'> <span class='text-lg'>Other</span></label>
            </div></div>
            <div class='mt-6'><div class='flex items-center gap-4 mb-2'><span class='inline-block'><svg class='h-7 w-7 text-purple-800' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path d='M16 7a4 4 0 01-8 0'/><path d='M12 3v4'/><path d='M12 17v4'/><path d='M3 12h4'/><path d='M17 12h4'/></svg></span><label class='block text-lg font-semibold text-purple-800'>Type of Printer Service</label></div>
                <select class='block w-full text-lg rounded-xl border-indigo-300 shadow-sm focus:ring-purple-800 focus:border-purple-800 px-4 py-3' name='printer_service'>
                    <option value=''>Select</option>
                    <option value='Toner Refil'>Toner Refil</option>
                    <option value='Paper Jamming'>Paper Jamming</option>
                    <option value='Printer Drum Replacement'>Printer Drum Replacement</option>
                    <option value='Printer Blade Problem'>Printer Blade Problem</option>
                    <option value='Could not connect to the printer'>Could not connect to the printer</option>
                    <option value='Printer Driver Issues'>Printer Driver Issues</option>
                    <option value='Printer Cable Issues'>Printer Cable Issues</option>
                    <option value='Printer Sharing Issues'>Printer Sharing Issues</option>
                    <option value='Other'>Other</option>
                </select>
            </div>`;
        } else if (type === 'Network Services') {
            html = `<div class='mt-8'><div class='flex items-center gap-4 mb-2'><span class='inline-block'><svg class='h-7 w-7 text-purple-800' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path d='M16 7a4 4 0 01-8 0'/><path d='M12 3v4'/><path d='M12 17v4'/><path d='M3 12h4'/><path d='M17 12h4'/></svg></span><label class='block text-lg font-semibold text-purple-800'>Network Service Type</label></div>
                <select class='block w-full text-lg rounded-xl border-indigo-300 shadow-sm focus:ring-purple-800 focus:border-purple-800 px-4 py-3' name='network_service'>
                    <option value=''>Select</option>
                    <option value='LAN Connectivity Issues'>LAN Connectivity Issues</option>
                    <option value='IP Request (New)'>IP Request (New)</option>
                    <option value='Specific Website Not Working'>Specific Website Not Working</option>
                    <option value='Internet connection request of Lab'>Internet connection request of Lab (Please Mention the Dept & Lab in the other field)</option>
                    <option value='Other'>Other</option>
                </select>
            </div>`;
        } else if (type === 'Projector') {
            html = `<div class='mt-8'><div class='flex items-center gap-4 mb-2'><span class='inline-block'><svg class='h-7 w-7 text-purple-800' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path d='M16 7a4 4 0 01-8 0'/><path d='M12 3v4'/><path d='M12 17v4'/><path d='M3 12h4'/><path d='M17 12h4'/></svg></span><label class='block text-lg font-semibold text-purple-800'>Projector Issues</label></div><div class='space-y-3'>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='projector_issues' value='Projector Not Working'> <span class='text-lg'>Projector Not Working</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='projector_issues' value='VGA Cable Not Working'> <span class='text-lg'>VGA Cable Not Working</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='projector_issues' value='HDMI to VGA Cable'> <span class='text-lg'>HDMI to VGA Cable</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='projector_issues' value='Projector MIC'> <span class='text-lg'>Projector MIC</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='projector_issues' value='Projector Remote'> <span class='text-lg'>Projector Remote</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='projector_issues' value='Speaker'> <span class='text-lg'>Speaker</span></label>
                <label class='flex items-center gap-2'><input class='form-checkbox h-5 w-5 text-purple-800' type='checkbox' name='projector_issues' value='System & Monitor'> <span class='text-lg'>System & Monitor</span></label>
            </div></div>`;
        } else if (type === 'Other') {
            html = `<div class='mt-8'><div class='flex items-center gap-4 mb-2'><span class='inline-block'><svg class='h-7 w-7 text-purple-800' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path d='M16 7a4 4 0 01-8 0'/><path d='M12 3v4'/><path d='M12 17v4'/><path d='M3 12h4'/><path d='M17 12h4'/></svg></span><label class='block text-lg font-semibold text-purple-800'>Other Service Details</label></div>
                <input type='text' class='block w-full text-lg rounded-xl border-indigo-300 shadow-sm focus:ring-purple-800 focus:border-purple-800 px-4 py-3' name='other_service' placeholder='Describe your issue'>
            </div>`;
        }
        container.innerHTML = html;
    }
    function previewImage(event) {
        const preview = document.getElementById('imagePreview');
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.innerHTML = `<img src='${e.target.result}' alt='Issue Image Preview' class='max-h-48 rounded-lg border border-gray-300 shadow'>`;
            };
            reader.readAsDataURL(file);
        } else {
            preview.innerHTML = '';
        }
    }
    </script>
</body>
</html>
