<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset User Password</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-50 flex flex-col items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 mt-8">
        <h2 class="text-2xl font-bold text-purple-800 mb-6 text-center">Reset Password for {{ user.name }}</h2>
        {% if error %}
        <div class="bg-red-100 text-red-700 px-4 py-2 rounded mb-4">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="mb-4">
                <label class="block font-bold mb-2">New Password</label>
                <input type="password" name="new_password" class="w-full px-4 py-2 border rounded-xl" required>
            </div>
            <div class="mb-4">
                <label class="block font-bold mb-2">Confirm Password</label>
                <input type="password" name="confirm_password" class="w-full px-4 py-2 border rounded-xl" required>
            </div>
            <button type="submit" class="bg-purple-800 text-white px-6 py-2 rounded-xl shadow hover:bg-indigo-900 w-full font-bold">Reset Password</button>
        </form>
        <div class="mt-6 text-center">
            <a href="/admin_dashboard" class="underline text-purple-800">Back to Dashboard</a>
        </div>
    </div>
    {% include 'footer.html' %}
</body>
</html>
